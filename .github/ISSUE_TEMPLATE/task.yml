name: "📌 Task"
description: "A discrete action item — not a feature or bug, but something that needs doing"
title: ""
labels: ["📌 task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for action items that don't involve writing code — e.g. follow-up communications, preparing materials, coordinating with stakeholders, or one-off investigations.

  - type: textarea
    id: description
    attributes:
      label: What needs to be done?
      description: A clear description of the task and what done looks like.
      placeholder: "e.g. Send follow-up materials to Vertex explaining the variation model output"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this need doing? What triggered it?
      placeholder: "e.g. The variation model was demonstrated at the Vertex showcase but the output wasn't clearly explained — a follow-up is needed to reinforce the message."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "🔴 P0-critical — blocks release/pilot"
        - "🟠 P1-high — important, not blocking"
        - "🟡 P2-medium — should have"
        - "🟢 P3-low — nice to have"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort estimate
      options:
        - "🔹 Small — less than 4 hours"
        - "🔸 Medium — 1–2 days"
        - "🔶 Large — 3–5 days"
        - "Unknown"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain area
      multiple: true
      options:
        - "⚙️ data-processing"
        - "📊 visualization"
        - "🗄️ database"
        - "🎨 ui-ux"
        - "📄 reports"
        - "🚀 deployment"
        - "🔍 Data Quality"
        - "👤 Subject Monitoring"
        - "🏥 Central Monitoring"
        - "⚠️ RAM"
        - "📚 documentation"
        - "🔧 tech-debt"
        - "Validation issue"
        - "🏭 data-generation"
        - "🧪 experimental-models"
        - "🫀 site-pulse"
        - "📉 dropcast"
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner
      description: Who is responsible for completing this?
      placeholder: "@username"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Any dependencies, deadlines, or useful context.
    validations:
      required: false
